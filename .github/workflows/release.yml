name: Build and release .deb

# Compila o pacote e publica uma Release apenas quando você criar uma
# tag de versão (ex.: v1.0.0). A versão do .deb é derivada da tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derivar versão da tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verificar sintaxe do app
        run: python3 -c "import ast; ast.parse(open('package/usr/bin/openfortivpn-indicator').read())"

      - name: Sincronizar versão no control, no app e no metainfo
        run: |
          V="${{ steps.ver.outputs.version }}"
          META=package/usr/share/metainfo/io.github.magacho.openfortivpn-indicator.metainfo.xml
          sed -i "s/^Version: .*/Version: $V/" package/DEBIAN/control
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"$V\"/" package/usr/bin/openfortivpn-indicator
          sed -i "s#<release version=\"[0-9.]*\"#<release version=\"$V\"#" "$META"
          sed -i "s#date=\"[0-9-]*\"#date=\"$(date +%F)\"#" "$META"
          grep '^Version:' package/DEBIAN/control
          grep '^APP_VERSION' package/usr/bin/openfortivpn-indicator
          grep '<release version=' "$META"

      - name: Validar AppStream metainfo (informativo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y appstream
          appstreamcli validate --no-net package/usr/share/metainfo/*.metainfo.xml || true

      - name: Construir o .deb
        run: bash build.sh

      - name: Validar o pacote (lintian, informativo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lintian
          lintian --no-tag-display-limit openfortivpn-indicator_*.deb || true

      - name: Publicar Release
        uses: softprops/action-gh-release@v3
        with:
          files: openfortivpn-indicator_*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
